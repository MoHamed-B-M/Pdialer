name: Build & Release (Official & Nightly)

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: read # ✅ ضروري لقراءة بيانات الـ PRs ووضعها في الـ Release Notes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ✅ ضروري لجلب تاريخ الـ commits لتوليد الـ changelog

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 1. تحديد نوع الإصدار (Official vs Nightly)
      - name: Set Release Metadata
        id: meta
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "release_name=Pdialer Optimized ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "release_name=Pdialer Nightly - $(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
            echo "release_tag=nightly" >> $GITHUB_OUTPUT
          fi

      # 2. بناء الـ APK
      - name: Build APKs
        run: |
          if [ "${{ steps.meta.outputs.is_tag }}" = "true" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      # 3. تجميع الملفات
      - name: Collect APKs
        run: |
          mkdir -p outputs
          find . -type f -name "*.apk" ! -path "*/build-cache/*" ! -path "*/intermediates/*" -exec cp {} outputs/ \;

      # 4. النشر مع توليد Release Notes تلقائياً
      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "outputs/*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ steps.meta.outputs.release_name }}
          tag: ${{ steps.meta.outputs.release_tag }}
          prerelease: ${{ steps.meta.outputs.is_tag != 'true' }}
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          # ✅ الخصائص الجديدة للحصول على شكل الصورة المطلوبة
          generateReleaseNotes: true
          makeLatest: ${{ steps.meta.outputs.is_tag == 'true' }}
          body: |
            ${{ steps.meta.outputs.is_tag == 'true' && '## 🚀 Official Stable Release' || '## 🌙 Nightly automated build' }}

            **Build Information:**
            - **Time:** $(date +'%Y-%m-%d %H:%M')
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}

            ---
            ### 📝 Full Changelog
            *(See below for the automated list of commits and PRs)*
